<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="TVBox - Xem video TikTok tổng tài trên TV">
    <title>TVBox - TikTok Tổng Tài</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="assets/icon.svg">
    <link rel="apple-touch-icon" href="assets/icon-192.png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
            overflow: hidden;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: #fff;
        }
        
        .app-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            padding: 20px 40px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .logo {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255,107,107,0.3);
        }
        
        .search-box {
            flex: 1;
            max-width: 500px;
            position: relative;
        }
        
        .search-box input {
            width: 100%;
            padding: 15px 25px;
            font-size: 20px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 30px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            outline: none;
            transition: all 0.3s;
        }
        
        .search-box input:focus {
            border-color: #ff6b6b;
            background: rgba(255,255,255,0.15);
        }
        
        .search-box input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        
        .category-tabs {
            display: flex;
            gap: 15px;
            padding: 20px 40px;
            background: rgba(0,0,0,0.2);
            overflow-x: auto;
        }
        
        .category-tab {
            padding: 12px 30px;
            font-size: 18px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 25px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            outline: none;
        }
        
        .category-tab:hover,
        .category-tab:focus {
            border-color: #ff6b6b;
            background: rgba(255,107,107,0.2);
            transform: scale(1.05);
        }
        
        .category-tab.active {
            background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
            border-color: transparent;
        }
        
        .video-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            padding: 30px 40px;
            overflow-y: auto;
            overflow-x: hidden;
        }
        
        .video-card {
            position: relative;
            aspect-ratio: 9/16;
            border-radius: 16px;
            overflow: hidden;
            background: rgba(0,0,0,0.3);
            cursor: pointer;
            transition: all 0.3s;
            border: 3px solid transparent;
            outline: none;
        }
        
        .video-card:hover,
        .video-card:focus {
            transform: scale(1.05);
            border-color: #ff6b6b;
            box-shadow: 0 0 40px rgba(255,107,107,0.4);
            z-index: 10;
        }
        
        .video-thumbnail {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .video-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 60px 15px 15px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
        }
        
        .video-author {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .video-desc {
            font-size: 14px;
            opacity: 0.8;
            display: -webkit-box;
            display: box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            box-orient: vertical;
            overflow: hidden;
        }
        
        .video-stats {
            display: flex;
            gap: 15px;
            margin-top: 8px;
            font-size: 13px;
            opacity: 0.7;
        }
        
        .play-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: rgba(255,107,107,0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .video-card:hover .play-overlay,
        .video-card:focus .play-overlay {
            opacity: 1;
        }
        
        .play-overlay::after {
            content: '';
            border-left: 30px solid #fff;
            border-top: 20px solid transparent;
            border-bottom: 20px solid transparent;
            margin-left: 8px;
        }
        
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
            font-size: 20px;
            opacity: 0.7;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: #ff6b6b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 15px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .video-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .video-modal.active {
            display: flex;
        }
        
        .video-player {
            width: 100%;
            height: 100%;
            max-width: 500px;
            background: #000;
        }
        
        .video-player iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .close-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            color: #fff;
            font-size: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            outline: none;
        }
        
        .close-btn:hover,
        .close-btn:focus {
            background: #ff6b6b;
            border-color: #ff6b6b;
        }
        
        .hint-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 14px;
            opacity: 0.8;
            z-index: 100;
        }
        
        .hint-bar kbd {
            background: rgba(255,255,255,0.2);
            padding: 4px 10px;
            border-radius: 5px;
            margin: 0 3px;
        }
        
        @media (max-width: 768px) {
            .video-grid {
                grid-template-columns: repeat(2, 1fr);
                padding: 15px;
            }
            
            .header {
                padding: 15px 20px;
            }
            
            .logo {
                font-size: 24px;
            }
            
            .search-box input {
                font-size: 16px;
                padding: 12px 18px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="logo">TVBox</div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Tìm kiếm tổng tài..." tabindex="1">
            </div>
        </header>
        
        <div class="category-tabs">
            <button class="category-tab active" data-category="tongtai" tabindex="2">Tổng Tài</button>
            <button class="category-tab" data-category="ceo" tabindex="3">CEO</button>
            <button class="category-tab" data-category="badboy" tabindex="4">Bad Boy</button>
            <button class="category-tab" data-category="gentleman" tabindex="5">Quý Ông</button>
            <button class="category-tab" data-category="fashion" tabindex="6">Thời Trang</button>
            <button class="category-tab" data-category="luxury" tabindex="7">Luxury</button>
        </div>
        
        <main class="video-grid" id="videoGrid">
            <div class="loading">
                <div class="spinner"></div>
                Đang tải video...
            </div>
        </main>
    </div>
    
    <div class="video-modal" id="videoModal">
        <button class="close-btn" id="closeBtn" tabindex="100">×</button>
        <div class="video-player" id="videoPlayer"></div>
    </div>
    
    <div class="hint-bar">
        <kbd>↑↓←→</kbd> Di chuyển <kbd>Enter</kbd> Chọn <kbd>Esc</kbd> Quay lại
    </div>
    
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .then(reg => console.log('Service Worker registered'))
                .catch(err => console.log('Service Worker registration failed'));
        }
    </script>
</body>
</html>
