<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <title>TVBox - TikTok Tổng Tài</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="assets/icon.svg">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        
        .landing {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            padding: 40px;
            text-align: center;
        }
        
        .logo {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .logo span {
            color: #ff0050;
        }
        
        .subtitle {
            font-size: 20px;
            opacity: 0.8;
            margin-bottom: 60px;
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 400px;
        }
        
        .option-btn {
            padding: 20px 30px;
            border-radius: 12px;
            border: none;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .option-btn.primary {
            background: #ff0050;
            color: #fff;
        }
        
        .option-btn.primary:hover {
            background: #ff1a66;
            transform: scale(1.02);
        }
        
        .option-btn.secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 2px solid rgba(255,255,255,0.3);
        }
        
        .option-btn.secondary:hover {
            background: rgba(255,255,255,0.2);
            border-color: #ff0050;
        }
        
        .hint {
            margin-top: 40px;
            font-size: 14px;
            opacity: 0.6;
            max-width: 300px;
            line-height: 1.6;
        }
        
        .nav-hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            font-size: 14px;
            opacity: 0.8;
        }
        
        .nav-hint kbd {
            background: rgba(255,255,255,0.2);
            padding: 4px 10px;
            border-radius: 4px;
        }
        
        @media (min-width: 768px) {
            .logo {
                font-size: 64px;
            }
            
            .subtitle {
                font-size: 24px;
            }
            
            .options {
                flex-direction: row;
                max-width: 600px;
            }
            
            .option-btn {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <div class="landing">
        <h1 class="logo">TV<span>Box</span></h1>
        <p class="subtitle">TikTok Tổng Tài for TV</p>
        
        <div class="options">
            <a href="player.html" class="option-btn primary">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M8 5v14l11-7z"/>
                </svg>
                Chơi TVBox
            </a>
        </div>
        
        <p class="hint">
            Xem video tổng tài với giao diện TikTok<br>
            Phím <kbd>↑</kbd> <kbd>↓</kbd> để chuyển video, <kbd>Enter</kbd> để mở
        </p>
    </div>
    
    
    <script>
        // TV keyboard navigation
        let focusedIndex = 0;
        const buttons = document.querySelectorAll('.option-btn');
        
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp':
                case 'ArrowLeft':
                    e.preventDefault();
                    focusedIndex = Math.max(0, focusedIndex - 1);
                    buttons[focusedIndex]?.focus();
                    break;
                    
                case 'ArrowDown':
                case 'ArrowRight':
                    e.preventDefault();
                    focusedIndex = Math.min(buttons.length - 1, focusedIndex + 1);
                    buttons[focusedIndex]?.focus();
                    break;
                    
                case 'Enter':
                    e.preventDefault();
                    buttons[focusedIndex]?.click();
                    break;
            }
        });
        
        // Focus first button
        buttons[0]?.focus();
        
        // Register service worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
    </script>
</body>
</html>
