<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <title>TVBox - TikTok Tổng Tài</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="assets/icon.svg">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .app-container {
            height: 100vh;
            width: 100vw;
            position: relative;
            background: #000;
        }
        
        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
        }
        
        .back-btn {
            color: #fff;
            text-decoration: none;
            font-size: 16px;
            opacity: 0.8;
            min-width: 40px;
        }
        
        .back-btn:hover {
            opacity: 1;
        }
        
        .search-box {
            flex: 1;
            max-width: 400px;
        }
        
        .search-box input {
            width: 100%;
            padding: 10px 20px;
            border-radius: 25px;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        
        .search-box input:focus {
            border-color: #ff0050;
            background: rgba(255,255,255,0.15);
        }
        
        .search-box input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        
        /* Video Container */
        .video-container {
            height: 100%;
            width: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            padding-top: 70px;
        }
        
        .video-container::-webkit-scrollbar {
            display: none;
        }
        
        /* Video Item */
        .video-item {
            height: calc(100vh - 70px);
            width: 100%;
            position: relative;
            scroll-snap-align: start;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }
        
        .video-frame {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .video-thumbnail-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        
        .play-button-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: rgba(255,0,80,0.8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .play-button-overlay:hover {
            transform: translate(-50%, -50%) scale(1.1);
        }
        
        .play-icon {
            font-size: 32px;
            color: #fff;
            margin-left: 5px;
        }
        
        /* Video Overlay */
        .video-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 100px;
            padding: 80px 20px 100px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            pointer-events: none;
        }
        
        .video-info {
            color: #fff;
        }
        
        .author-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }
        
        .author-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #fff;
        }
        
        .author-name {
            font-size: 16px;
            font-weight: 600;
        }
        
        .post-time {
            font-size: 12px;
            opacity: 0.6;
            margin-left: auto;
        }
        
        .video-desc {
            font-size: 15px;
            line-height: 1.4;
            margin-bottom: 8px;
        }
        
        .hashtag {
            color: #ff0050;
            font-weight: 500;
        }
        
        .music-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            opacity: 0.9;
        }
        
        .music-icon {
            animation: spin 3s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* Action Buttons */
        .action-buttons {
            position: absolute;
            right: 10px;
            bottom: 100px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            pointer-events: auto;
        }
        
        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #fff;
            cursor: pointer;
            transition: transform 0.1s;
        }
        
        .action-btn:active {
            transform: scale(0.9);
        }
        
        .action-icon {
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            backdrop-filter: blur(10px);
            transition: color 0.2s;
        }
        
        .action-btn span {
            font-size: 11px;
            font-weight: 500;
        }
        
        .record-disc {
            animation: spin 5s linear infinite;
        }
        
        /* Loading */
        .loading-indicator {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 200;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            color: #fff;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #ff0050;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        /* Hints */
        .nav-hints {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 25px;
            display: flex;
            gap: 15px;
            align-items: center;
            z-index: 100;
            font-size: 12px;
            color: #fff;
            opacity: 0.9;
        }
        
        .nav-hints kbd {
            background: rgba(255,255,255,0.2);
            padding: 3px 8px;
            border-radius: 4px;
            font-family: inherit;
        }
        
        /* Mute Indicator */
        .mute-indicator {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            z-index: 300;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            background: rgba(0,0,0,0.7);
            padding: 20px;
            border-radius: 50%;
        }
        
        .mute-indicator.show {
            opacity: 1;
        }
        
        /* API Key Notice */
        .api-notice {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,0,80,0.9);
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 12px;
            z-index: 90;
            display: none;
        }
        
        /* TV Optimizations */
        @media (min-width: 1024px) {
            .action-icon {
                width: 56px;
                height: 56px;
                font-size: 26px;
            }
            
            .author-name {
                font-size: 20px;
            }
            
            .video-desc {
                font-size: 18px;
            }
            
            .search-box input {
                font-size: 20px;
                padding: 12px 24px;
            }
            
            .nav-hints {
                font-size: 14px;
                padding: 12px 24px;
            }
            
            .nav-hints kbd {
                padding: 4px 10px;
            }
        }
        
        /* Focus styles */
        .action-btn:focus {
            outline: 2px solid #ff0050;
            outline-offset: 2px;
            border-radius: 50%;
        }
        
        .search-box input:focus {
            outline: 2px solid #ff0050;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <a href="index.html" class="back-btn">←</a>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Tìm kiếm tổng tài..." value="tổng tài">
            </div>
        </header>
        
        <div class="api-notice" id="apiNotice">
            Đang dùng dữ liệu mẫu - Thêm API key để tìm video thật
        </div>
        
        <div class="video-container" id="videoContainer">
            <div class="video-feed" id="videoFeed"></div>
        </div>
        
        <div class="loading-indicator" id="loadingIndicator">
            <div class="spinner"></div>
            <span>Đang tải...</span>
        </div>
        
        <div class="mute-indicator" id="muteIndicator">🔊</div>
        
        <div class="nav-hints">
            <span><kbd>↑</kbd> Prev</span>
            <span><kbd>↓</kbd> Next</span>
            <span><kbd>Enter</kbd> Mở</span>
            <span><kbd>Esc</kbd> Mute</span>
        </div>
    </div>
    
    <script src="api.js"></script>
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
    </script>
</body>
</html>
